# 龟钮体系 — Nginx 反向代理配置
# 同服务器部署，三项目统一对外
# 部署位置：/etc/nginx/conf.d/guiniu.conf

# ========== 上游服务 ==========

# 龟钮·印信 — X402 支付（后端 port 3000）
upstream guiniu-seal {
    server 127.0.0.1:3000;
    keepalive 16;
}

# 龟钮·印证 — 数据存证集市（后端 port 3001）
upstream guiniu-verify {
    server 127.0.0.1:3001;
    keepalive 16;
}

# 龟钮·印鉴 — 汽车 AI 智能体（后端 port 80，AI 主体）
upstream guiniu-deveco {
    server 127.0.0.1:80;
    keepalive 16;
}

# ========== 服务器配置 ==========

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书
    ssl_certificate     /etc/nginx/ssl/your-domain.pem;
    ssl_certificate_key /etc/nginx/ssl/your-domain.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # ========== 路由规则 ==========

    # 龟钮·印信 — X402 支付
    location /api/x402/ {
        proxy_pass http://guiniu-seal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # 龟钮·印证 — 数据存证集市
    location /api/verify/ {
        proxy_pass http://guiniu-verify/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # 龟钮·印鉴 — 汽车 AI 智能体（AI 主体，含 AI 聊天流式响应）
    location /api/deveco/ {
        proxy_pass http://guiniu-deveco/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # AI 流式响应不缓冲
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /health {
        return 200 '{"status":"ok","project":"guiniu","version":"1.0.0"}';
        add_header Content-Type application/json;
    }
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}
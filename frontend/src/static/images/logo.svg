<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8923E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A67C52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 外框 - 印章风格 -->
  <rect x="10" y="10" width="180" height="180" rx="16" ry="16" 
        fill="none" stroke="url(#goldGrad)" stroke-width="6" />
  
  <!-- 内框 -->
  <rect x="24" y="24" width="152" height="152" rx="10" ry="10" 
        fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-opacity="0.5" />
  
  <!-- 龟钮（龟形） - 顶部 -->
  <g transform="translate(100, 58)">
    <!-- 龟壳 -->
    <ellipse cx="0" cy="0" rx="32" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- 龟壳纹路 -->
    <line x1="0" y1="-22" x2="0" y2="22" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="-20" y1="-12" x2="-20" y2="12" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="20" y1="-12" x2="20" y2="12" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- 头部 -->
    <ellipse cx="-38" cy="-5" rx="10" ry="7" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <!-- 眼睛 -->
    <circle cx="-42" cy="-6" r="2" fill="#C8923E"/>
    <!-- 尾巴 -->
    <path d="M 32,0 Q 42,-4 45,2" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <!-- 脚 -->
    <path d="M -18,18 L -22,28 M 18,18 L 22,28" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
  </g>
  
  <!-- 下方文字 - 印证 -->
  <g transform="translate(100, 130)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="36" 
          font-weight="bold" fill="url(#goldGrad)" letter-spacing="8">印证</text>
  </g>
  
  <!-- 小点装饰 -->
  <circle cx="40" cy="40" r="3" fill="#C8923E" opacity="0.5"/>
  <circle cx="160" cy="40" r="3" fill="#C8923E" opacity="0.5"/>
  <circle cx="40" cy="160" r="3" fill="#C8923E" opacity="0.5"/>
  <circle cx="160" cy="160" r="3" fill="#C8923E" opacity="0.5"/>
</svg>